# ============================================================
# SplitTheBill — PRODUCTION Configuration
# Override values from application.properties
# Set environment variables on EC2 before starting the app
# ============================================================

# Application
spring.application.name=splitthebill

# MySQL DataSource — RDS endpoint injected via env var
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/hotelsplit_db?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Redis — running on same EC2 instance
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# JWT — use a strong secret via env var
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Frontend URL — EC2 public IP or domain
app.frontend-url=${FRONTEND_URL}

# AWS S3 — credentials injected via env var
app.aws.bucket-name=splitthebill-pdfs
app.aws.region=ap-southeast-2
app.aws.access-key=${AWS_ACCESS_KEY}
app.aws.secret-key=${AWS_SECRET_KEY}

# Logging — less verbose in prod
logging.level.com.hotelsplit=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/splitthebill/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
