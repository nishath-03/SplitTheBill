# Server
server.port=8085

# Application Name
spring.application.name=splitthebill

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/hotelsplit_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1523
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# JWT
app.jwt.secret=splitthebill-super-secret-jwt-key-must-be-at-least-512-bits-long-for-hs512-algorithm-2024
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Frontend URL
app.frontend-url=http://localhost:5173

# AWS S3
app.aws.bucket-name=splitthebill-pdfs
app.aws.region=ap-south-1
app.aws.access-key=${AWS_ACCESS_KEY:}
app.aws.secret-key=${AWS_SECRET_KEY:}

# Logging
logging.level.com.hotelsplit=DEBUG
logging.level.org.springframework.security=INFO

